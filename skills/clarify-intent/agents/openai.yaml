display_name: Clarify Intent
short_description: Ask a few high-value clarification questions, then rewrite the request as an execution brief.
default_prompt: If the request is underspecified, ask a small batch of targeted clarification questions first. Then rewrite the request as a compact execution brief with goal, scope, non-goals, constraints, acceptance criteria, open questions, and additional context needed. Use that brief as the working contract for the next implementation step.
